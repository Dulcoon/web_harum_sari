name: 🚀 Deploy Laravel (Proper Structure)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil code dari repo
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: 📦 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, pdo, mysql
          tools: composer

      # 3. Install dependency Laravel
      - name: 📦 Install dependencies
        run: composer install --no-dev --optimize-autoloader

      # 4. Prepare Laravel (optional)
      - name: ⚙️ Prepare Laravel
        run: |
          cp .env.example .env || true
          php artisan key:generate || true

      # 5. 🚀 Deploy CORE Laravel (tanpa public)
      - name: 🚀 Deploy Laravel Core
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /laravel-crud/
          exclude: |
            **/public/**
            **/.git*
            **/node_modules/**
            **/tests/**
            **/.env

      # 6. 🚀 Deploy PUBLIC ke public_html
      - name: 🚀 Deploy Public Folder
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./public/
